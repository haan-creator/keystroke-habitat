<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>身體簽名 Body Signature</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { 
    overflow: hidden; 
    background: #0a0a0a; 
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  canvas { display: block; }
  
  button.kb-btn {
    font-family: 'Courier New', monospace;
    background: #111;
    color: #888;
    border: 1px solid #222;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.08s, color 0.08s, transform 0.06s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    position: absolute;
  }
  button.kb-btn:active {
    transform: scale(0.93);
    background: #1a1a1a;
  }
  
  button.ctrl-btn {
    font-family: 'Courier New', monospace;
    background: transparent;
    color: #555;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    cursor: pointer;
    position: absolute;
    letter-spacing: 0.08em;
    transition: color 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  button.ctrl-btn:hover {
    color: #999;
    border-color: #444;
  }
</style>
</head>
<body>
<script>
// ── Web Audio API ──
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.32, t + 0.015);
  gain.gain.linearRampToValueAtTime(0.12, t + duration * 0.4);
  gain.gain.linearRampToValueAtTime(0, t + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration);
}

// ── 隨機但固定的音高映射 ──
const alphabet = 'abcdefghijklmnopqrstuvwxyz';
const pitchPool = [
  196, 523, 330, 880, 247, 698, 415, 1047,
  294, 587, 370, 784, 220, 659, 440, 988,
  262, 554, 349, 740, 208, 622, 466, 932, 311, 831
];

let _seed = 42;
function seededRandom() {
  _seed = (_seed * 16807) % 2147483647;
  return _seed / 2147483647;
}

const _indices = Array.from({length: 26}, (_, i) => i);
for (let i = _indices.length - 1; i > 0; i--) {
  let j = Math.floor(seededRandom() * (i + 1));
  [_indices[i], _indices[j]] = [_indices[j], _indices[i]];
}
const letterFreq = {};
for (let i = 0; i < 26; i++) letterFreq[alphabet[i]] = pitchPool[_indices[i]];

// ── 固定色相映射 ──
const letterHue = {};
const huePool = Array.from({length: 26}, (_, i) => (i * 360 / 26));
_seed = 137;
for (let i = huePool.length - 1; i > 0; i--) {
  let j = Math.floor(seededRandom() * (i + 1));
  [huePool[i], huePool[j]] = [huePool[j], huePool[i]];
}
for (let i = 0; i < 26; i++) letterHue[alphabet[i]] = huePool[i];

// ── 狀態 ──
let letterCount = {};
let letterSequence = [];
let pauseSequence = [];
let lastPressTime = 0;
let mode = 'input';
let playIndex = 0;
let playTimer = 0;
let isPlaying = false;
let particles = [];
let kbButtons = [];
let ctrlBtnEls = [];
const rows = ['qwertyuiop','asdfghjkl','zxcvbnm'];
let W, H, kbTop, kbBtnW, kbBtnH, kbGap;

function setup() {
  W = windowWidth; H = windowHeight;
  createCanvas(W, H);
  colorMode(HSB, 360, 100, 100, 100);
  for (let c of alphabet) letterCount[c] = 0;
  layoutKeyboard();
  buildKeyboard();
  buildControls();
}

function layoutKeyboard() {
  kbGap = W * 0.008;
  kbBtnW = (W - kbGap * 11) / 10;
  kbBtnH = min(H * 0.068, 52);
  kbTop = H * 0.64;
}

function buildKeyboard() {
  kbButtons.forEach(b => b.remove());
  kbButtons = [];
  for (let r = 0; r < rows.length; r++) {
    let row = rows[r];
    let rowBtnW = r === 2 ? (W - kbGap * 8) / 7 : kbBtnW;
    let rowW = row.length * (rowBtnW + kbGap) - kbGap;
    let startX = (W - rowW) / 2;
    let y = kbTop + r * (kbBtnH + kbGap);
    for (let i = 0; i < row.length; i++) {
      let c = row[i];
      let x = startX + i * (rowBtnW + kbGap);
      let btn = document.createElement('button');
      btn.className = 'kb-btn';
      btn.textContent = c;
      Object.assign(btn.style, {
        left: x+'px', top: y+'px', width: rowBtnW+'px', height: kbBtnH+'px',
        fontSize: Math.floor(kbBtnH*0.38)+'px'
      });
      let letter = c;
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault(); initAudio(); pressLetter(letter);
        let h = letterHue[letter];
        btn.style.color = `hsl(${h},70%,75%)`;
        btn.style.background = `hsl(${h},30%,12%)`;
        btn.style.borderColor = `hsl(${h},40%,25%)`;
        setTimeout(() => { btn.style.color='#888'; btn.style.background='#111'; btn.style.borderColor='#222'; }, 150);
      });
      document.body.appendChild(btn);
      kbButtons.push(btn);
    }
  }
}

function buildControls() {
  ctrlBtnEls.forEach(b => b.remove());
  ctrlBtnEls = [];
  let btnY = H * 0.92, btnH = Math.min(H*0.05, 40);
  let fs = Math.floor(Math.min(H*0.018, 14))+'px';
  
  function makeBtn(id, label, leftPct, widthPct, handler) {
    let b = document.createElement('button');
    b.className = 'ctrl-btn'; b.id = id; b.textContent = label;
    Object.assign(b.style, { left: (W*leftPct)+'px', top: btnY+'px', width: (W*widthPct)+'px', height: btnH+'px', fontSize: fs });
    b.addEventListener('pointerdown', (e) => { e.preventDefault(); handler(); });
    document.body.appendChild(b);
    ctrlBtnEls.push(b);
  }
  makeBtn('resetBtn', '重來', 0.06, 0.25, resetAll);
  makeBtn('doneBtn', '看結果 →', 0.55, 0.38, showResult);
  makeBtn('replayBtn', '▶ 重播', 0.55, 0.38, startPlayback);
  document.getElementById('replayBtn').style.display = 'none';
}

function pressLetter(c) {
  if (mode !== 'input') return;
  let now = millis();
  pauseSequence.push(lastPressTime > 0 ? min(now - lastPressTime, 4000) : 200);
  lastPressTime = now;
  letterCount[c]++;
  letterSequence.push(c);
  playTone(letterFreq[c], 0.45);
  for (let i = 0; i < 3; i++) {
    particles.push({
      x: W/2+random(-W*0.3,W*0.3), y: H*0.3+random(-H*0.08,H*0.08),
      vx: random(-1.5,1.5), vy: random(-2,-0.3),
      size: random(H*0.012,H*0.028), hue: letterHue[c], alpha: 70, c: c, life: 1.0
    });
  }
}

function draw() {
  background(0, 0, 4);
  if (mode === 'input') drawInputMode();
  else { drawResultMode(); if (isPlaying) handlePlayback(); }
  // 粒子
  for (let i = particles.length-1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy -= 0.015; p.life -= 0.012; p.alpha = p.life*55;
    if (p.life <= 0) { particles.splice(i,1); continue; }
    noStroke(); fill(p.hue, 45, 65, p.alpha);
    textAlign(CENTER,CENTER); textSize(p.size*p.life); text(p.c, p.x, p.y);
  }
}

function drawInputMode() {
  let px = W*0.06;
  fill(0,0,55); noStroke(); textFont('monospace');
  textSize(min(H*0.016,13)); textAlign(LEFT,TOP); text('身體簽名', px, H*0.03);
  fill(0,0,30); textSize(min(H*0.013,11));
  text(letterSequence.length > 0 ? letterSequence.length+' 個字母' : '開始打字', px, H*0.055);
  if (letterSequence.length > 0) drawWaveform(px);
  drawCloud(px);
}

function drawWaveform(px) {
  let total = letterSequence.length, dw = W-px*2, by = H*0.3, mh = H*0.14;
  let minP=Infinity, maxP=-Infinity;
  for (let c of letterSequence) { let p=letterFreq[c]; if(p<minP)minP=p; if(p>maxP)maxP=p; }
  if (minP===maxP) { minP-=100; maxP+=100; }
  noFill(); beginShape();
  for (let i=0; i<total; i++) {
    let c=letterSequence[i], x=px+(i/max(total-1,1))*dw;
    let nP=(letterFreq[c]-minP)/(maxP-minP), y=by+mh*0.5-nP*mh;
    stroke(letterHue[c],45,55,35); strokeWeight(1.2); vertex(x,y);
  }
  endShape();
  for (let i=0; i<total; i++) {
    let c=letterSequence[i], x=px+(i/max(total-1,1))*dw;
    let nP=(letterFreq[c]-minP)/(maxP-minP), y=by+mh*0.5-nP*mh;
    let last=(i===total-1);
    noStroke(); fill(letterHue[c], last?70:40, last?95:50, last?90:50);
    textAlign(CENTER,CENTER); textSize(last?min(H*0.018,14):min(H*0.011,9)); text(c,x,y);
  }
}

function drawCloud(px) {
  let mc = max(1, max(Object.values(letterCount)));
  let ty = H*0.44, ah = H*0.16;
  for (let r=0; r<rows.length; r++) {
    let row=rows[r];
    for (let i=0; i<row.length; i++) {
      let c=row[i], cnt=letterCount[c];
      let xR=(i+(r===1?0.5:r===2?1.5:0))/10, yR=r/3;
      let x=px+xR*(W-px*2), y=ty+yR*ah;
      let ratio=cnt/mc, sz=cnt===0?min(H*0.013,10):map(ratio,0,1,H*0.016,H*0.045);
      let h=letterHue[c], bri=cnt===0?18:map(ratio,0,1,35,95), sat=cnt===0?0:map(ratio,0,1,20,75);
      noStroke(); fill(h,sat,bri); textAlign(CENTER,CENTER); textSize(sz);
      textStyle(ratio>0.6?BOLD:NORMAL); text(c,x,y);
    }
  }
}

function drawResultMode() {
  let px = W*0.06;
  // 字頻
  fill(0,0,45); noStroke(); textFont('monospace');
  textSize(min(H*0.014,11)); textAlign(LEFT,TOP); text('字頻', px, H*0.025);
  let sorted = Object.keys(letterCount).filter(c=>letterCount[c]>0).sort((a,b)=>letterCount[b]-letterCount[a]);
  if (sorted.length > 0) {
    let mc=letterCount[sorted[0]], aw=W-px*2, bt=H*0.055, bh=H*0.1;
    for (let i=0; i<sorted.length; i++) {
      let c=sorted[i], ratio=letterCount[c]/mc, x=px+(i/sorted.length)*aw;
      let bw=max(aw/sorted.length-2,2), barH=ratio*bh, h=letterHue[c];
      noStroke(); fill(h,55,60,55); rect(x,bt+bh-barH,bw,barH,1);
      fill(h,35,75); textAlign(CENTER,TOP); textSize(min(H*0.011,9)); textStyle(NORMAL);
      text(c, x+bw/2, bt+bh+3);
    }
  }
  // 節奏
  fill(0,0,45); textSize(min(H*0.014,11)); textAlign(LEFT,TOP); text('節奏', px, H*0.20);
  let total=letterSequence.length;
  if (total > 0) {
    let at=H*0.235, aw2=W-px*2, ah=H*0.2;
    let weights=[], tw=0;
    for (let i=0;i<total;i++) { let w=sqrt(pauseSequence[i]||200); weights.push(w); tw+=w; }
    let maxRows=4, rh=ah/maxRows, rb=[0], rx=0;
    for (let i=0;i<total;i++) {
      rx+=(weights[i]/tw)*aw2;
      if (rx>aw2 && i>rb[rb.length-1]) { rb.push(i); rx=(weights[i]/tw)*aw2; }
    }
    for (let row=0; row<Math.min(rb.length,maxRows); row++) {
      let si=rb[row], ei=row+1<rb.length?rb[row+1]:total;
      let rw=0; for(let i=si;i<ei;i++) rw+=weights[i];
      let x=px, y=at+row*rh+rh*0.5;
      for (let i=si;i<ei;i++) {
        let c=letterSequence[i], h=letterHue[c], cw=(weights[i]/rw)*aw2;
        if ((pauseSequence[i]||200)>600 && i>si) {
          stroke(0,0,18); strokeWeight(0.5);
          line(x-cw*0.1,y-rh*0.3,x-cw*0.1,y+rh*0.3);
        }
        noStroke();
        let isAct=isPlaying&&i===playIndex-1, isPast=i<playIndex;
        fill(h, isPast?12:(isAct?85:45), isPast?28:(isAct?100:60));
        textAlign(CENTER,CENTER); textSize(isAct?min(H*0.022,16):min(H*0.015,11));
        textStyle(isAct?BOLD:NORMAL); text(c, x+cw*0.5, y);
        x+=cw;
      }
    }
  }
  // 聲音
  fill(0,0,45); textSize(min(H*0.014,11)); textAlign(LEFT,TOP); text('聲音', px, H*0.465);
  let cx=W/2, cy=H*0.65, mr=min(W,H)*0.16;
  if (isPlaying && playIndex>0 && playIndex<=letterSequence.length) {
    let c=letterSequence[playIndex-1], h=letterHue[c], freq=letterFreq[c];
    let nf=map(freq,196,1047,0,1), r=mr*0.35+nf*mr*0.65;
    for (let i=4;i>0;i--) { fill(h,55,75,(i/4)*12); noStroke(); circle(cx,cy,r*2*(1+i*0.18)); }
    fill(h,65,85,45); noStroke(); circle(cx,cy,r*2);
    fill(h,25,100); textAlign(CENTER,CENTER); textSize(min(H*0.045,32)); textStyle(BOLD); text(c,cx,cy);
    noFill(); stroke(0,0,25); strokeWeight(1);
    arc(cx,cy,mr*2.4,mr*2.4,-HALF_PI,-HALF_PI+(playIndex/letterSequence.length)*TWO_PI);
  } else if (!isPlaying && playIndex>=letterSequence.length && letterSequence.length>0) {
    let s2=Object.keys(letterCount).filter(c=>letterCount[c]>0).sort((a,b)=>letterCount[b]-letterCount[a]);
    for (let i=0;i<s2.length;i++) {
      let c=s2[i], ang=(i/s2.length)*TWO_PI-HALF_PI;
      let ratio=letterCount[c]/(letterCount[s2[0]]||1), r2=mr*0.45+ratio*mr*0.45;
      noStroke(); fill(letterHue[c],40,55); textAlign(CENTER,CENTER);
      textSize(map(ratio,0,1,min(H*0.01,8),min(H*0.024,17))); text(c,cx+cos(ang)*r2,cy+sin(ang)*r2);
    }
    fill(0,0,22); textAlign(CENTER,CENTER); textSize(min(H*0.013,10)); text('播放完畢',cx,cy);
  } else {
    noStroke(); fill(0,0,8); circle(cx,cy,mr*1.2);
    fill(0,0,22); textAlign(CENTER,CENTER); textSize(min(H*0.013,10)); text('等待播放',cx,cy);
  }
}

function handlePlayback() {
  if (playIndex >= letterSequence.length) { isPlaying=false; return; }
  let cp = pauseSequence[playIndex]||300, pp = max(cp*0.7, 80);
  if (millis()-playTimer > pp) {
    let c=letterSequence[playIndex];
    playTone(letterFreq[c], 0.4);
    let h=letterHue[c], cx=W/2, cy=H*0.65;
    for (let i=0;i<2;i++) {
      particles.push({x:cx+random(-25,25),y:cy+random(-25,25),vx:random(-2,2),vy:random(-1.5,0.5),
        size:random(H*0.01,H*0.018),hue:h,alpha:50,c:c,life:1.0});
    }
    playIndex++; playTimer=millis();
  }
}

function startPlayback() { initAudio(); playIndex=0; playTimer=millis(); isPlaying=true; }

function showResult() {
  if (letterSequence.length===0) return;
  mode='result';
  kbButtons.forEach(b=>b.style.display='none');
  document.getElementById('doneBtn').style.display='none';
  document.getElementById('replayBtn').style.display='';
  startPlayback();
}

function resetAll() {
  mode='input'; letterSequence=[]; pauseSequence=[]; lastPressTime=0;
  for(let c of alphabet) letterCount[c]=0;
  isPlaying=false; playIndex=0; particles=[];
  kbButtons.forEach(b=>b.style.display='');
  document.getElementById('doneBtn').style.display='';
  document.getElementById('replayBtn').style.display='none';
}

function windowResized() {
  W=windowWidth; H=windowHeight; resizeCanvas(W,H);
  layoutKeyboard(); buildKeyboard(); buildControls();
}

function keyPressed() {
  if (mode!=='input') return;
  let c=key.toLowerCase();
  if (alphabet.includes(c)) { initAudio(); pressLetter(c); }
}
</script>
</body>
</html>
